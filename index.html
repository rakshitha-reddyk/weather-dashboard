<!-- main page to load -->
<!doctype html>
<html lang="en">
  <head>
    <!-- Page metadata and external stylesheet -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>        
  </head>
  <body>
    <!-- Main application container -->
    <div class="container">
        <!-- Header section -->
        <div class="header">
            <button id="themeToggle" onclick="toggleTheme()">🌙</button>

            <h1>🌤️ Weather Dashboard</h1>
            <p>Your real-time weather companion</p>
        </div>

        <!-- Search bar -->
        <div class="search-box">
            <input
            type="text"
            id="cityInput"
            placeholder="Enter city name..."
            value="London"
            />
            <button onclick="searchWeather()">Search</button>
        </div>
        
        <!-- Error and loading messages -->
        <div id="errorMsg" class="error" style="display: none"></div>
        <div id="loading" class="loading" style="display: none">
        Loading weather data...
        </div>
        
        <!-- Weather dashboard -->
        <div id="weatherContent" style="display: none">

            <!-- Current weather -->
            <div class="current-weather">
            <div class="current-weather-header">
                <div>
                    <div class="location" id="location">-</div>
                    <div class="date" id="date">-</div>
                </div>
            </div>
            <div class="current-main">
                <div class="weather-icon" id="currentIcon">-</div>
            <div class="temp-info">
                <div class="temperature" id="temperature">-</div>
            <div class="description" id="description">-</div>
            </div>
            </div>
            <div class="weather-details">
               <div class="detail-item">
                    <div class="label">Feels Like</div>
                    <div class="value" id="feelsLike"></div>
                </div>
                <div class="detail-item">
                    <div class="label">Humidity</div>
                    <div class="value" id="humidity"></div>
                </div>
                <div class="detail-item">
                    <div class="label">Wind Speed</div>
                    <div class="value" id="windSpeed"></div>
                </div>
                <div class="detail-item">
                    <div class="label">Pressure</div>
                    <div class="value" id="pressure"></div>
                </div>
            </div>
        </div>
        
        <!-- Hourly forecast -->
        <div class="forecast-section">
            <h2>Hourly Forecast</h2>
            <div class="hourly-forecast" id="hourlyForecast"></div>
        </div>
    
        <!-- 7-day forecast -->
        <div class="forecast-section">
            <h2>7-Day Forecast</h2>
            <div class="daily-forecast" id="dailyForecast"></div>
        </div>
    </div>
  </body>
</html>
